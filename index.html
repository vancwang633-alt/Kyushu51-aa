<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五一九州行-记账本</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:"PingFang SC","Helvetica Neue",sans-serif;background:#f2f7fb;color:#333;max-width:700px;margin:30px auto;padding:0 20px}
        .header{text-align:center;background:#e5eff8;border-radius:20px;padding:24px;margin-bottom:20px}
        .card{background:white;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
        input,select{width:100%;padding:12px;border-radius:10px;margin-bottom:10px;border:1px solid #eee}
        .btn{width:100%;background:#5a88b3;color:white;border:none;padding:12px;border-radius:10px;margin-top:5px}
        .bill-item{padding:14px;border-bottom:1px dashed #eee}
        .bill-actions{display:flex;gap:8px;margin-top:10px}
        .bill-actions button{flex:1;padding:10px;border-radius:8px;border:none;color:white}
        .split-box{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
        .edit-mode{display:none}
        .rate-tip{background:#eef5ff;padding:10px 14px;border-radius:10px;display:flex;justify-content:space-between;margin-bottom:10px}
        .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;text-align:center;padding:10px 0}
        .result-item{padding:8px 12px;border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between}
        
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:9999}
        .modal-content{background:#fff;width:85%;max-width:350px;border-radius:16px;padding:28px;text-align:center}
        .modal-btns{display:flex;gap:12px;margin-top:20px}
        .modal-btns button{flex:1;padding:12px;border-radius:10px;border:none}
        .toast{position:fixed;bottom:20%;left:50%;transform:translate(-50%,0);background:#333;color:white;padding:10px 18px;border-radius:10px;display:none}
    </style>
</head>
<body>

<div class="modal" id="delModal">
    <div class="modal-content">
        <h3>确定删除此账单？</h3>
        <p style="margin:10px 0;color:#666">删除后无法恢复</p>
        <div class="modal-btns">
            <button onclick="closeDelModal()" style="background:#f1f1f1">取消</button>
            <button onclick="confirmDel()" style="background:#e35353;color:white">确认删除</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<div class="header"><h1>五一九州行-记账本</h1></div>
<div class="rate-tip" id="rateTip" style="display:none">
    <span>💱 实时汇率：<span id="realRate">-</span></span>
    <button onclick="useRealRate()">使用</button>
</div>

<div class="card">
    <input type="text" id="members" value="小王,陈局,刘导,段段,Y经理,乱总,紫央,Jerry">
    <div style="display:flex;gap:8px;margin-bottom:10px">
        <input type="number" id="rate" step="0.01" value="5.0" style="width:120px">
        <span>元/100日元</span>
    </div>
    <button class="btn" onclick="fetchRealRate()">刷新实时汇率</button>
    <button class="btn" onclick="saveSettings()">保存设置</button>
</div>

<div class="card" id="addCard">
    <select id="category">
        <option>🍣 餐饮</option>
        <option>🚆 交通</option>
        <option>🏨 酒店</option>
        <option>🎫 门票</option>
        <option>🛍️ 购物</option>
        <option>🍵 零食</option>
        <option>🧩 其他</option>
    </select>
    <input type="text" id="title" placeholder="消费说明">
    <select id="payer"><option>小王</option><option>陈局</option><option>刘导</option><option>段段</option><option>Y经理</option><option>乱总</option><option>紫央</option><option>Jerry</option></select>
    <input type="number" id="jpy" placeholder="金额（日元）">
    <button onclick="toggleSelectAll()">一键全选</button>
    <div class="split-box" id="splitContainer"></div>
    <button class="btn" onclick="addBill()">保存账单</button>
</div>

<div class="card edit-mode" id="editCard">
    <input type="hidden" id="editIndex">
    <select id="editCategory"></select>
    <input type="text" id="editTitle">
    <select id="editPayer"></select>
    <input type="number" id="editJpy">
    <button onclick="toggleSelectAllEdit()">一键全选</button>
    <div class="split-box" id="editSplitContainer"></div>
    <button class="btn" onclick="saveEdit()">保存修改</button>
    <button class="btn" onclick="cancelEdit()">取消</button>
</div>

<div class="card">
    <div class="stats">
        <div><div id="totalJpy">0</div><div>总花费（日元）</div></div>
        <div><div id="totalCny">0</div><div>总花费（人民币）</div></div>
        <div><div id="perJpy">0</div><div>人均支出（日元）</div></div>
        <div><div id="perCny">0</div><div>人均支出（人民币）</div></div>
    </div>
</div>

<div class="card"><div id="result"></div></div>
<div class="card"><div id="billList"></div></div>

<button class="btn" onclick="clearAll()" style="background:#e35353">清空账本</button>

<script>
let bills = [];
let currentRealRate = null;
let deleteIndex = null;

function showToast(m){const t=document.getElementById("toast");t.innerText=m;t.style.display="block";setTimeout(()=>t.style.display="none",1500)}
function save(){localStorage.setItem("b",JSON.stringify(bills))}
function load(){const d=localStorage.getItem("b");if(d)bills=JSON.parse(d)}

function renderMember(container,list=[]){
    const arr=document.getElementById("members").value.split(",").map(i=>i.trim()).filter(i=>i);
    container.innerHTML="";
    arr.forEach(m=>{
        const el=document.createElement("div");
        el.innerHTML=`<input type="checkbox" value="${m}" ${list.includes(m)?"checked":""}>${m}`;
        container.appendChild(el);
    });
}

function toggle(container){
    const all=document.querySelectorAll(`#${container} input`);
    const c=!document.querySelectorAll(`#${container} input:checked`).length;
    all.forEach(i=>i.checked=c);
}

function get(container){
    const arr=[];
    document.querySelectorAll(`#${container} input:checked`).forEach(i=>arr.push(i.value));
    return arr;
}

window.onload=()=>{load();renderMember(splitContainer);render()}

function render(){
    const rate=parseFloat(document.getElementById("rate").value)||5;
    const arr=document.getElementById("members").value.split(",").map(i=>i.trim()).filter(i=>i);
    let total=0,bal={};arr.forEach(m=>bal[m]=0);
    bills.forEach(b=>{total+=b.jpy;const p=b.jpy/b.split.length;bal[b.payer]+=b.jpy;b.split.forEach(i=>bal[i]-=p)});

    document.getElementById("totalJpy").innerText=total;
    document.getElementById("totalCny").innerText=(total*rate/100).toFixed(2);
    document.getElementById("perJpy").innerText=arr.length?(total/arr.length).toFixed(0):0;
    document.getElementById("perCny").innerText=arr.length?(total*rate/100/arr.length).toFixed(2):0;

    let h="";arr.forEach(m=>{
        const v=bal[m];
        if(v>1)h+=`<div class="result-item" style="background:#e6f4e9">${m} 应收 ¥${(v*rate/100).toFixed(2)}</div>`;
        else if(v<-1)h+=`<div class="result-item" style="background:#fee">${m} 应付 ¥${(-v*rate/100).toFixed(2)}</div>`;
        else h+=`<div class="result-item">${m} 已两清</div>`;
    });
    document.getElementById("result").innerHTML=h;

    let bh="";bills.forEach((b,i)=>{
        bh+=`<div class="bill-item"><div>${b.cate} ${b.title}</div><div>${b.payer} 付款 ${b.jpy}日元</div><div class="bill-actions"><button onclick="edit(${i})" style="background:#5a88b3">编辑</button><button onclick="openDel(${i})" style="background:#e35353">删除</button></div></div>`;
    });
    document.getElementById("billList").innerHTML=bh||"暂无记录";
}

function add(){
    const t=document.getElementById("title").value.trim();
    const p=document.getElementById("payer").value;
    const j=parseFloat(document.getElementById("jpy").value);
    const s=get("splitContainer");
    if(!t||!p||isNaN(j)||j<=0||s.length===0){showToast("请填写完整");return}
    bills.push({cate:document.getElementById("category").value,title:t,payer:p,jpy:j,split:s,time:new Date().toLocaleString()});
    document.getElementById("title").value="";document.getElementById("jpy").value="";
    save();render();
}

function edit(i){
    const b=bills[i];
    document.getElementById("editIndex").value=i;
    document.getElementById("editCategory").innerHTML=document.getElementById("category").innerHTML;
    document.getElementById("editCategory").value=b.cate;
    document.getElementById("editTitle").value=b.title;
    document.getElementById("editPayer").innerHTML=document.getElementById("payer").innerHTML;
    document.getElementById("editPayer").value=b.payer;
    document.getElementById("editJpy").value=b.jpy;
    renderMember(editSplitContainer,b.split);
    document.getElementById("addCard").style.display="none";
    document.getElementById("editCard").style.display="block";
}

function saveEdit(){
    const i=parseInt(document.getElementById("editIndex").value);
    const t=document.getElementById("editTitle").value.trim();
    const p=document.getElementById("editPayer").value;
    const j=parseFloat(document.getElementById("editJpy").value);
    const s=get("editSplitContainer");
    if(!t||!p||isNaN(j)||j<=0||s.length===0){showToast("请填写完整");return}
    bills[i]={...bills[i],cate:document.getElementById("editCategory").value,title:t,payer:p,jpy:j,split:s};
    cancel();save();render();
}

function cancel(){document.getElementById("addCard").style.display="block";document.getElementById("editCard").style.display="none"}
function openDel(i){deleteIndex=i;document.getElementById("delModal").style.display="flex"}
function closeDelModal(){document.getElementById("delModal").style.display="none"}
function confirmDel(){bills.splice(deleteIndex,1);save();render();closeDelModal()}
function toggleSelectAll(){toggle("splitContainer")}
function toggleSelectAllEdit(){toggle("editSplitContainer")}
function saveSettings(){renderMember(splitContainer);render();showToast("保存成功")}

async function fetchRealRate(){
    try{const r=await(await fetch("https://open.er-api.com/v6/latest/JPY")).json();
        currentRealRate=(r.rates.CNY*100).toFixed(2);
        document.getElementById("realRate").innerText=`100日元 = ${currentRealRate}元`;
        document.getElementById("rateTip").style.display="flex";
        showToast("刷新成功");
    }catch(e){showToast("获取失败")}
}

function useRealRate(){
    if(!currentRealRate){showToast("请先刷新");return}
    document.getElementById("rate").value=currentRealRate;
    render();showToast("已使用最新汇率");
}

function clearAll(){if(confirm("确定清空？")){bills=[];save();render()}}
</script>
</body>
</html>
