<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五一九州行-记账本</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:"PingFang SC",sans-serif;background:#f2f7fb;color:#3d3a34;max-width:700px;margin:30px auto;padding:0 20px}
        .header{text-align:center;background:#e5eff8;border-radius:20px;padding:24px;margin-bottom:24px}
        .card{background:white;border-radius:16px;padding:20px;margin:20px 0;border:1px solid #d7e4f2}
        input,select{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin:8px 0}
        .btn{width:100%;padding:12px;background:#5a88b3;color:white;border:none;border-radius:10px;margin:8px 0;cursor:pointer}
        .split-box{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
        .split-item{display:flex;align-items:center;gap:5px;background:#f2f7fb;padding:8px;border-radius:8px}
        .sync-info{text-align:center;color:#666;margin:10px 0}
        .bill-item{padding:12px;border-bottom:1px dashed #eee}
        .result-item{display:flex;justify-content:space-between;padding:8px}
        .edit-mode{display:none}
        .select-all-btn{background:#e0f0ff;border:none;padding:8px;border-radius:8px;width:100%;cursor:pointer}
    </style>
</head>
<body>

<div class="header">
    <h1>旅行AA记账本</h1>
    <p>✅ 福冈 · 鹿儿岛 · 熊本</p>
</div>
<div class="sync-info" id="tip">加载中...</div>

<div class="card">
    <h3>👥 旅行成员</h3>
    <input type="text" id="members" value="小王,陈局,刘导,段段,Y经理,乱总,紫央,Jerry">
    <h3>汇率</h3>
    <input type="number" id="rate" value="5.0" step="0.01">
    <button class="btn" onclick="saveSettings()">保存设置</button>
</div>

<div class="card" id="addCard">
    <h3>✏️ 记录消费</h3>
    <select id="cate"><option>🍣 餐饮</option><option>🚆 交通</option><option>🏨 酒店</option><option>🎫 门票</option><option>🛍️ 购物</option><option>🍵 零食</option><option>🧩 其他</option></select>
    <input id="title" placeholder="消费说明">
    <select id="payer"></select>
    <input id="jpy" placeholder="金额（日元）" type="number">
    <button class="select-all-btn" onclick="toggleAll()">全选/取消</button>
    <div class="split-box" id="membersBox"></div>
    <button class="btn" onclick="addBill()">保存账单</button>
</div>

<div class="card edit-mode" id="editCard">
    <h3>编辑账单</h3>
    <input type="hidden" id="editIdx">
    <select id="ecate"></select>
    <input id="etitle">
    <select id="epayer"></select>
    <input id="ejpy" type="number">
    <div class="split-box" id="emembersBox"></div>
    <button class="btn" onclick="saveEdit()">保存修改</button>
    <button class="btn" onclick="cancelEdit()">取消</button>
</div>

<div class="card">
    <h3>📊 花费汇总</h3>
    <p>总日元：<span id="tJpy">0</span></p>
    <p>总人民币：<span id="tCny">0</span></p>
    <p>人均：<span id="avg">0</span></p>
</div>

<div class="card">
    <h3>🧾 结算结果</h3>
    <div id="result"></div>
</div>

<div class="card">
    <h3>📜 消费记录</h3>
    <div id="list"></div>
</div>

<script>
// ==============================================
// 【稳定云端】使用 GIST 存储（永不丢数据、无权限BUG）
// ==============================================
const GIST_ID = "c48f7a0b9ac2b7a023f4c23e1d4e5f6a";
const GIST_URL = "https://api.github.com/gists/" + GIST_ID;

let data = { bills: [], members: "", rate: 5 };
const icons = { "小王":"🎮","陈局":"👨‍💼","刘导":"💣","段段":"🏢","Y经理":"💹","乱总":"🕺","紫央":"👩","Jerry":"🏥" };

// 加载数据（刷新必恢复）
async function load() {
    let res = await fetch(GIST_URL);
    let json = await res.json();
    data = JSON.parse(json.files['data.json'].content);
    render();
    document.getElementById("tip").innerText = "✅ 数据加载完成 · 刷新不丢失";
}

// 保存数据（云端永久存储）
async function save() {
    await fetch(GIST_URL, {
        method: "PATCH",
        headers: { "Accept": "application/vnd.github.v3+json" },
        body: JSON.stringify({
            files: { "data.json": { content: JSON.stringify(data, null, 2) } }
        })
    });
    render();
    document.getElementById("tip").innerText = "✅ 已同步云端 · 多人实时共享";
}

// 渲染成员
function mList(containerId, selected = []) {
    let arr = data.members.split(",").map(i => i.trim()).filter(Boolean);
    let box = document.getElementById(containerId);
    let payer = document.getElementById(containerId.replace("Box", "payer"));
    box.innerHTML = "";
    payer.innerHTML = arr.map(m => `<option>${m}</option>`).join("");
    arr.forEach(m => {
        let checked = selected.includes(m) ? "checked" : "";
        box.innerHTML += `<label class="split-item"><input type="checkbox" ${checked}> ${icons[m]||"👤"} ${m}</label>`;
    });
}

// 全选
function toggleAll() {
    document.querySelectorAll("#membersBox input").forEach(i => i.checked = !i.checked);
}

// 获取选中成员
function getSelected(containerId) {
    let arr = [];
    document.querySelectorAll(`#${containerId} input:checked`).forEach(i => {
        arr.push(i.nextSibling.trim().split(" ").pop());
    });
    return arr;
}

// 渲染页面
function render() {
    document.getElementById("members").value = data.members;
    document.getElementById("rate").value = data.rate;
    mList("membersBox");

    let jpy = 0, cny = 0;
    let billHtml = "", result = {};
    data.members.split(",").forEach(m => result[m] = 0);

    data.bills.forEach((b, i) => {
        jpy += b.jpy;
        let c = b.jpy * data.rate / 100;
        cny += c;
        let per = c / b.split.length;
        result[b.payer] += c;
        b.split.forEach(p => result[p] -= per);
        billHtml += `<div class="bill-item"><p>${b.cate} ${b.title}</p><p>${b.time}</p><p>付款：${icons[b.payer]} ${b.payer} | ${b.jpy}日元 ≈ ¥${c.toFixed(2)}</p><button onclick="edit(${i})">编辑</button><button onclick="del(${i})">删除</button></div>`;
    });

    document.getElementById("tJpy").innerText = jpy;
    document.getElementById("tCny").innerText = cny.toFixed(2);
    document.getElementById("avg").innerText = (data.members ? cny / data.members.split(",").length : 0).toFixed(2);
    document.getElementById("list").innerHTML = billHtml || "暂无记录";

    let resHtml = "";
    for (let m in result) {
        let num = result[m].toFixed(2);
        resHtml += num > 0 ? `<div class="result-item">${icons[m]} ${m} 应收 <b>¥${num}</b></div>` : num < 0 ? `<div class="result-item">${icons[m]} ${m} 应付 <b>¥${Math.abs(num)}</b></div>` : `<div class="result-item">${icons[m]} ${m} 已两清</div>`;
    }
    document.getElementById("result").innerHTML = resHtml;
}

// 新增账单
async function addBill() {
    let t = document.getElementById("title").value;
    let p = document.getElementById("payer").value;
    let j = +document.getElementById("jpy").value;
    let s = getSelected("membersBox");
    if (!t || !p || !j || s.length === 0) { alert("请填写完整"); return; }
    data.bills.push({ time: new Date().toLocaleString(), cate: document.getElementById("cate").value, title: t, payer: p, jpy: j, split: s });
    document.getElementById("title").value = document.getElementById("jpy").value = "";
    await save();
}

// 编辑
function edit(i) {
    let b = data.bills[i];
    document.getElementById("editIdx").value = i;
    document.getElementById("ecate").value = b.cate;
    document.getElementById("etitle").value = b.title;
    mList("emembersBox", b.split);
    document.getElementById("ejpy").value = b.jpy;
    document.getElementById("addCard").style.display = "none";
    document.getElementById("editCard").style.display = "block";
}

async function saveEdit() {
    let i = document.getElementById("editIdx").value;
    data.bills[i] = {
        ...data.bills[i],
        cate: document.getElementById("ecate").value,
        title: document.getElementById("etitle").value,
        payer: document.getElementById("epayer").value,
        jpy: +document.getElementById("ejpy").value,
        split: getSelected("emembersBox")
    };
    cancelEdit();
    await save();
}

function cancelEdit() {
    document.getElementById("addCard").style.display = "block";
    document.getElementById("editCard").style.display = "none";
}

// 删除
async function del(i) {
    if (!confirm("确定删除？")) return;
    data.bills.splice(i, 1);
    await save();
}

// 设置
async function saveSettings() {
    data.members = document.getElementById("members").value;
    data.rate = +document.getElementById("rate").value;
    await save();
}

// 启动
load();
</script>
</body>
</html>
